<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ryan Liu</title>
    <meta name="description" content="Ryan Liu — CSU undergraduate exploring multimodal LLMs." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">

      <header class="header">
        <span class="header-name">Ryan Liu</span>
        <nav class="header-nav">
          <a href="#education">Education</a>
          <a href="#awards">Awards</a>
          <a href="#research">Research</a>
          <a href="#projects">Projects</a>
          <a href="#about">About</a>
        </nav>
      </header>

      <div class="layout">

        <aside class="sidebar reveal">
          <h1 id="hero-name"></h1>
          <p class="sidebar-intro" id="hero-intro"></p>
          <div class="sidebar-meta">
            <span id="profile-location"></span>
          </div>

          <div class="sidebar-section">
            <h2 class="sidebar-label">Contact</h2>
            <div id="contact-list"></div>

        <main class="main-content">

          <section class="section reveal" id="education">
            <h2 class="section-title">Education</h2>
            <div id="education-content"></div>

          <section class="section reveal" id="awards">

            <div id="awards-list"></div>

          <section class="section reveal" id="research">
            <h2 class="section-title">Research</h2>
            <div id="research-content"></div>
          </section>

          <section class="section reveal" id="projects">
            <h2 class="section-title">Projects</h2>
            <div class="project-grid" id="project-grid"></div>
          </section>

          <section class="section reveal" id="about">
            <h2 class="section-title">About</h2>
            <div id="about-content"></div>
          </section>

        </main>

      </div>

      <footer class="footer">
        <span>© <span id="footer-year"></span> Ryan Liu</span>
      </footer>

    </div>
    <script src="./script.js"></script>

</html>
